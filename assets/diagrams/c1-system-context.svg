<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430" role="img" aria-labelledby="title desc">
  <title id="title">C1 System Context View</title>
  <desc id="desc">Publisher ad slot and advertiser campaign system interact with the RTB bidding system.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1080" height="430" fill="#f8fafc"/>
  <text x="540" y="54" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C1: System Context</text>

  <rect x="395" y="170" width="290" height="120" rx="14" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="540" y="224" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">RTB Bidding</text>
  <text x="540" y="254" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">System</text>

  <rect x="70" y="170" width="190" height="90" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Publisher</text>
  <text x="165" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Ad Slot</text>

  <rect x="805" y="170" width="210" height="90" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="910" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Advertiser</text>
  <text x="910" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Campaign System</text>

  <path d="M260 205 L389 205" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="320" y="186" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#334155">ProviderSlotRequest</text>

  <path d="M395 255 C340 310 254 310 193 260" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="290" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#334155">AuctionResult</text>

  <path d="M805 215 L691 215" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="758" y="196" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#334155">Campaign data</text>
</svg>

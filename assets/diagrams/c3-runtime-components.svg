  <path d="M515 244 L515 278" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <path d="M580 317 L736 226" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="652" y="253" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#334155">BidRequest</text>

  <path d="M872 211 L914 211" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M993 244 L993 278" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M993 350 L993 384" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M920 423 L878 423" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <path d="M742 423 L586 344" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="658" y="407" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#334155">BidResponse / No-Bid</text>

  <path d="M515 350 L515 384" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M450 423 L401 423" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <path d="M250 423 C178 420 142 382 120 356" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="185" y="450" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#334155">AuctionResult</text>

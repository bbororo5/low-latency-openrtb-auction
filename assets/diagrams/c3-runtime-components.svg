  <rect x="920" y="390" width="145" height="66" rx="10" fill="#0f766e" filter="url(#shadow)"/>
  <text x="993" y="430" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Pricing</text>


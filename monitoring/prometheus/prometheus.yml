global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "rtb-ssp"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "host.docker.internal:8080"
        labels:
          app: "ssp"

  - job_name: "rtb-dsp"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "host.docker.internal:8081"
        labels:
          app: "dsp"
          dsp_id: "dsp-a"
      - targets:
          - "host.docker.internal:8082"
        labels:
          app: "dsp"
          dsp_id: "dsp-b"
      - targets:
          - "host.docker.internal:8083"
        labels:
          app: "dsp"
          dsp_id: "dsp-c"
      - targets:
          - "host.docker.internal:8084"
        labels:
          app: "dsp"
          dsp_id: "dsp-d"
